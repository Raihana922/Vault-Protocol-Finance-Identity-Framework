{% extends "base.html" %}

{% block content %}
<div class="viewport-content" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="kinetic-card" style="width: 100%; max-width: 450px; text-align: center; border-color: rgba(34, 197, 94, 0.4); box-shadow: 0 0 50px rgba(34,197,94,0.1);">
        <div style="margin-bottom: 2.5rem;">
            <h1 style="font-size: 2rem; color: var(--rt-text); margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(34,197,94,0.3);">THE RESERVE</h1>
            <p style="color: var(--rt-mint); font-family: 'Fira Code', monospace; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;">AUTHENTICATE CLEARANCE</p>
        </div>

        <form method="POST" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="text-align: left;">
                <label for="email">Identity Token [EMAIL]</label>
                <input type="email" id="email" name="email" class="nm-input" placeholder="operative@reserve.net" required autocomplete="off">
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label for="password">Cryptographic Sequence</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="nm-input" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword('password')" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--rt-mint);">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">AUTHORIZE LINK</button>
        </form>

        <div style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem;">
            <div style="flex: 1; height: 2px; background: rgba(34, 197, 94, 0.1);"></div>
            <div style="font-size: 0.7rem; color: var(--rt-text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-family: 'Fira Code', monospace;">EXTERNAL AUTH</div>
            <div style="flex: 1; height: 2px; background: rgba(34, 197, 94, 0.1);"></div>
        </div>

        <a href="{{ url_for('login_google') }}" class="btn btn-outline" style="width: 100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right: 0.75rem;"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            GOOGLE PROTOCOL
        </a>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem;">
            <a href="{{ url_for('reset_request') }}" style="color: var(--rt-text-muted); text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.2);">RECOVER LOST CLEARANCE</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
{% endblock %}
