{% extends "base.html" %}

{% block content %}
<style>
    .vault-guillotine-container {
        width: 100%; max-width: 600px;
        margin: 6vh auto; position: relative;
        overflow: hidden; border-radius: 12px;
        /* Outer thick metal frame */
        background: #0a0a0a;
        box-shadow: 
            0 0 0 10px #1a1a1a,
            0 0 0 12px var(--rt-mint),
            0 20px 50px rgba(0,0,0,0.9);
    }
    
    .vault-doors {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; z-index: 50; pointer-events: none;
    }
    .door-left, .door-right {
        width: 50%; height: 100%;
        background: linear-gradient(90deg, #111, #222);
        border: 2px solid #333;
        display: flex; flex-direction: column; justify-content: center;
        transition: transform 0.8s cubic-bezier(1, 0, 0, 1);
        position: relative;
    }
    .door-left { border-right: 4px solid var(--rt-mint); align-items: flex-end; }
    .door-right { border-left: 4px solid var(--rt-mint); align-items: flex-start; }
    
    .bolt-receiver {
        width: 40px; height: 16px; background: #000;
        margin: 10px 0; border: 1px solid #333;
    }
    
    .deadbolt {
        width: 60px; height: 16px; background: var(--rt-mint);
        margin: 10px 0; transform: translateX(-100%);
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 0 10px var(--rt-mint);
    }
    .deadbolt.locked { transform: translateX(20px); } /* Slide into receiver */

    .valve-wheel {
        position: absolute;
        width: 120px; height: 120px; border-radius: 50%;
        border: 10px solid #333;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 60;
        transition: transform 0.5s ease-in;
    }
    .valve-spoke {
        position: absolute; width: 100%; height: 10px; background: #333;
        top: 50%; left: 0; transform: translateY(-50%);
    }

    /* Vault Open State */
    .vault-open .door-left { transform: translateX(-100%); }
    .vault-open .door-right { transform: translateX(100%); }
    .vault-open .valve-wheel { transform: translate(-50%, -50%) rotate(180deg) scale(0); opacity: 0; }

    /* The actual form inside */
    .vault-interior { padding: 4rem; text-align: center; background: var(--rt-base); }

    .hidden-input {
        position: absolute; opacity: 0;
        width: 100%; height: 100%; left: 0; top: 0; z-index: 70; cursor: text;
    }
    
    .code-display {
        font-family: 'Fira Code', monospace; font-size: 3rem;
        letter-spacing: 0.5em; color: var(--rt-mint);
        text-shadow: 0 0 20px var(--rt-mint);
        margin-bottom: 2rem; font-weight: 700;
        min-height: 4rem;
    }
</style>

{% if request.args.get('reauth') %}
<div class="flash error" style="max-width: 600px; margin: 0 auto 2rem auto; text-align: center; background: var(--rt-crimson); color: white;">
    CRITICAL OVERRIDE: ASSET TRANSFER EXCEEDS $50K THRESHOLD. ENGAGE MANDATORY CRYPTOLOGIC SHIELD.
</div>
{% endif %}

<div class="vault-guillotine-container" id="vault-core">
    <!-- Overlay Doors -->
    <div class="valve-wheel" id="wheel"><div class="valve-spoke"></div><div class="valve-spoke" style="transform: translateY(-50%) rotate(90deg);"></div></div>
    <div class="vault-doors">
        <div class="door-left">
            <!-- 6 Deadbolts -->
            <div class="deadbolt" id="b0"></div>
            <div class="deadbolt" id="b1"></div>
            <div class="deadbolt" id="b2"></div>
            <div class="deadbolt" id="b3"></div>
            <div class="deadbolt" id="b4"></div>
            <div class="deadbolt" id="b5"></div>
        </div>
        <div class="door-right">
            <!-- 6 Receivers -->
            <div class="bolt-receiver"></div>
            <div class="bolt-receiver"></div>
            <div class="bolt-receiver"></div>
            <div class="bolt-receiver"></div>
            <div class="bolt-receiver"></div>
            <div class="bolt-receiver"></div>
        </div>
    </div>

    <!-- Interior Form -->
    <div class="vault-interior">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--rt-text);">CENTRAL LOCK</h2>
        <p style="color: var(--rt-bullion); font-family: 'Fira Code', monospace; font-size: 0.85rem; margin-bottom: 3rem;">PROVIDE AUTHORIZATION SEQUENCE</p>

        <form method="POST" id="mfaForm" style="position: relative;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" id="otp_code" name="otp_code" class="hidden-input" maxlength="6" autocomplete="off" required autofocus>
            
            <div class="code-display" id="display">------</div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; opacity: 0;" id="submitBtn">
                DISENGAGE LOCKS
            </button>
        </form>
    </div>
</div>

<script>
    const input = document.getElementById('otp_code');
    const display = document.getElementById('display');
    const vault = document.getElementById('vault-core');
    const wheel = document.getElementById('wheel');
    const btn = document.getElementById('submitBtn');
    
    input.addEventListener('input', (e) => {
        input.value = input.value.replace(/[^0-9]/g, '');
        const val = input.value;
        const len = val.length;
        
        // Update display with hyphens for empty spaces
        let formatted = val;
        for(let i=len; i<6; i++) formatted += '-';
        display.textContent = formatted;
        
        // Snap deadbolts based on length
        for(let i=0; i<6; i++) {
            const bolt = document.getElementById('b'+i);
            if(i < len) bolt.classList.add('locked');
            else bolt.classList.remove('locked');
        }
        
        if (len === 6) {
            // Spin wheel and crack vault open
            wheel.style.transform = 'translate(-50%, -50%) rotate(360deg)';
            setTimeout(() => {
                vault.classList.add('vault-open');
                btn.style.opacity = '1';
                // Auto submit briefly after opening
                setTimeout(() => document.getElementById('mfaForm').submit(), 800);
            }, 500);
        } else {
            vault.classList.remove('vault-open');
            btn.style.opacity = '0';
        }
    });

    // To ensure focus
    vault.addEventListener('click', () => input.focus());
</script>
{% endblock %}
