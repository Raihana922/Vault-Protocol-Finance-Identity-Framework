{% extends "base.html" %}

{% block content %}
<div class="viewport-content" style="display: flex; min-height: calc(100vh - 10rem); justify-content: center; align-items: center;">

    <div class="kinetic-card" style="width: 100%; max-width: 450px; text-align: center; border-color: var(--rt-bullion); box-shadow: 0 0 30px rgba(234,179,8,0.2);">
        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--rt-bullion);">TRACE LOST</h2>
        <p style="color: var(--rt-text-muted); font-size: 0.85rem; margin-bottom: 2rem; font-family: 'Fira Code', monospace;">TRANSMIT KNOWN IDENTIFIER TO INITIATE RECOVERY.</p>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="text-align: left;">
                <label>Identifier Payload [EMAIL]</label>
                <input type="email" name="email" class="nm-input" placeholder="user@reserve.net" required autocomplete="off" style="border-color: rgba(234,179,8,0.3); color: var(--rt-bullion);">
            </div>
            
            <button type="submit" class="btn btn-outline" style="width: 100%; border-color: var(--rt-bullion); color: var(--rt-bullion);">PING MASTER LEDGER</button>
        </form>

        <div style="margin-top: 2rem; font-size: 0.75rem; font-family: 'Fira Code', monospace;">
            <a href="{{ url_for('login') }}" style="color: var(--rt-text-muted); text-decoration: none;">[ CANCEL OPERATION ]</a>
        </div>
    </div>
</div>
{% endblock %}
